---
- name: Lab 5 - Config Router loopback by Variable
  hosts: routers
  connection: network_cli
  gather_facts: false

  tasks:
    - name: Config Loopback 1 with unique IP for each device
      cisco.ios.ios_config:
        parents: interface Loopback1
        lines:
          - description {{ description }}
          - ip address {{ my_loopback_ip }} 255.255.255.255
        save_when: modified